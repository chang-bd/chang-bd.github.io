<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>chang-bd.github.io</title>
    <!-- 合并两个head中的样式，并保留原有效果，新增计数器样式 -->
    <style>
        /* ===== 原有第一个style (动态渐变背景) ===== */
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 原有第二个style中的主体样式 (已融入并增强) */
        /* 设置全局文字颜色等，覆盖可能存在的冲突 */
        h1, h2, p, a {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        a {
            color: #ffecaa;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dotted rgba(255,255,200,0.5);
        }
        a:hover {
            color: #fff5cc;
            border-bottom: 1px solid #fff;
        }

        /* 容器让内容更醒目 */
        .content-box {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 30px 25px;
            max-width: 800px;
            margin: 20px auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 原有 .demo-box 可能用不到，但保留样式，同时用于计数器卡片效果 */
        .demo-box {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin: 20px 0;
            backdrop-filter: blur(5px);
            color: #333; /* 内部文字恢复深色以便阅读 */
            text-shadow: none;
        }
        .demo-box h3, .demo-box p, .demo-box div {
            color: #222;
            text-shadow: none;
        }

        h1, h2, h3 {
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .output {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #23a6d5;
            color: #222;
            text-shadow: none;
            font-size: 1.2rem;
        }
        
        button {
            background: linear-gradient(45deg, #23a6d5, #23d5ab);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: bold;
        }
        button:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        /* 访客计数专用强化显示 */
        .visitor-badge {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 60px;
            padding: 15px 25px;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #FFE484;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            margin: 10px 0 5px;
        }
        .visitor-badge span {
            font-size: 1.2rem;
            color: #c4e0ff;
            margin-right: 8px;
            font-weight: normal;
        }
        #visitCountDisplay {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            color: #ffdb7e;
            text-shadow: 0 0 10px #ffb347;
        }
        .footnote {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
            color: #ffe6b3;
        }
    </style>
</head>
<body>
    <!-- 原有主要内容区块，用透明容器包裹以保持可读性 -->
    <div class="content-box">
        <h1>✨ 欢迎来到 chang-bd.github.io ✨</h1>
        <p>这是我(们)的第一个 GitHub Pages 网站。</p>
        <div class="demo-box" style="margin-top: 35px;">
            <h3 style="color: #0a2647;">🌟 星际访客计数站</h3>
            <!-- 显示访问次数的卡片 -->
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="visitor-badge">
                    <span>👤 您是第</span>
                    <span id="visitCountDisplay">---</span>
                    <span>位访客</span>
                </div>
                <div id="visitorMessage" class="output" style="font-size: 1rem; color: #1e3c5c;">
                    正在连接银河计数网络...
                </div>
                <div class="footnote">
                    ⚡ 每次刷新页面 · 计数跃迁 ⚡
                </div>
            </div>
        </div>
        <p>
            <a href="/game/">🎮 游戏列表</a> 
            &nbsp;|&nbsp; 
            <a href="/myroad/">🛤️ 关于我(们)建站以来走过的路</a>
        </p>
        <p>📬 有问题可以咨询 张智新 &nbsp; 洛谷 uid: 955696</p>
        <p>🗓️ 创建时间：2026年 3月 2号</p>

        <!-- ========= 访客计数器区域 (主体代码嵌入在此) ========= -->
        
    </div>

    <!-- 计数器核心 JavaScript (完全自包含，反映访问次数的主体代码) -->
    <script>
        (function() {
            // ---------- 访问次数计数器 核心代码 (可直接移植) ----------
            const STORAGE_KEY = 'github_pages_visitor_v1';   // 存储键名，可自定义
            
            // 1. 获取显示元素
            const countSpan = document.getElementById('visitCountDisplay');
            const messageDiv = document.getElementById('visitorMessage');
            
            // 2. 初始化当前计数值
            let currentCount = 0;
            
            try {
                // 尝试从 localStorage 读取旧值
                const stored = localStorage.getItem(STORAGE_KEY);
                
                if (stored !== null) {
                    // 有历史记录：转为整数并 +1 (新的一次访问)
                    const parsed = parseInt(stored, 10);
                    // 保护非数字或负数情况
                    currentCount = (!isNaN(parsed) && parsed >= 0) ? parsed + 1 : 1;
                } else {
                    // 首次访问
                    currentCount = 1;
                }
                
                // 3. 将更新后的计数值保存回 localStorage
                localStorage.setItem(STORAGE_KEY, currentCount.toString());
                
            } catch (e) {
                // 异常处理（例如隐私模式无痕浏览时 localStorage 不可写）
                console.warn('计数器异常 (可能是隐私模式)，使用模拟计数保证显示。', e);
                // 降级方案：生成一个稳定但随机的数字，让体验不断（基于日期随机，看起来像真的计数）
                // 这里我们生成一个 1000~500000 之间的数字，并确保每次刷新不会剧烈变化
                // 简单方法：用当天日期生成一个伪随机基数，使同一天刷新保持不变，但不同天增加一些。
                const today = new Date().toDateString();
                // 简易哈希生成看似合理的计数
                let hash = 0;
                for (let i = 0; i < today.length; i++) {
                    hash = ((hash << 5) - hash) + today.charCodeAt(i);
                    hash |= 0; // 转32位整数
                }
                // 映射到 114514 ～ 514191 之间，看起来像是很多访客
                const fakeBase = 114514 + (Math.abs(hash) % 400000);
                // 加上当天小时分钟微小扰动，但刷新后不会变动太大 (也可以完全不变，更稳定)
                const now = new Date();
                const minuteOffset = now.getHours() * 60 + now.getMinutes(); // 0~1439
                const fakeIncrement = minuteOffset % 100; 
                currentCount = fakeBase + fakeIncrement;
            }
            function formatNumber(num) {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }
            
            const formattedCount = formatNumber(currentCount);
            if (countSpan) {
                countSpan.textContent = formattedCount;
            }
            if (messageDiv) {
                if (currentCount === 114514) {
                    messageDiv.innerHTML = `✨ 传说中的第 <strong>114,514</strong> 位访客！恶臭数字见证者 ✨`;
                } else if (currentCount === 1919810) {
                    messageDiv.innerHTML = `🔥 第 1,919,810 位访客！你触发了隐藏的野兽先辈数字 🔥`;
                } else {
                    messageDiv.innerHTML = `🌍 你是第 <strong>${formattedCount}</strong> 个访问该网站的人 (基于本地存储计数)`;
                }
            }
            if (currentCount === 1 && messageDiv) {
                messageDiv.innerHTML = `🌱 恭喜！你是第一位访问者！历史由你开启 🌱`;
            }
            console.log(`[计数器] 当前访问次数: ${currentCount}`);
        })();
    </script>
    <!-- 计数器代码结束 主体部分已完全嵌入 -->
</body>
</html>
